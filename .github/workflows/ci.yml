name: CI

# PRs only — pushes to main are validated by the release workflow, which runs
# the same checks before publishing (no need to build main twice).
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm package:vscode
      - uses: actions/upload-artifact@v4
        with:
          name: route-scout-vsix
          path: packages/vscode/*.vsix
          if-no-files-found: error
