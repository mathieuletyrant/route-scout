name: Release

# Releases happen straight from main: bump the version in
# packages/vscode/package.json and push. The job publishes only when that
# version has no matching `v<version>` git tag yet (so ordinary commits are
# no-ops), then tags the commit and creates a GitHub Release with the .vsix.
#
# Publishing requires VSCE_PAT (VS Marketplace); OVSX_TOKEN adds Open VSX.
# With no VSCE_PAT configured the job stays a no-op (nothing is tagged).
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: check
        run: |
          VERSION=$(node -p "require('./packages/vscode/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -z "$VSCE_PAT" ]; then
            echo "No VSCE_PAT configured — skipping." && echo "release=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "v$VERSION already tagged — skipping." && echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing v$VERSION." && echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.release == 'true'
      - uses: actions/setup-node@v4
        if: steps.check.outputs.release == 'true'
        with:
          node-version: 22
          cache: pnpm

      - if: steps.check.outputs.release == 'true'
        run: pnpm install --frozen-lockfile

      # Gate the release on a green build.
      - if: steps.check.outputs.release == 'true'
        run: pnpm check
      - if: steps.check.outputs.release == 'true'
        run: pnpm typecheck
      - if: steps.check.outputs.release == 'true'
        run: pnpm test
      - if: steps.check.outputs.release == 'true'
        run: pnpm build

      - name: Package extension
        if: steps.check.outputs.release == 'true'
        run: pnpm package:vscode

      - name: Publish to VS Marketplace
        if: steps.check.outputs.release == 'true'
        working-directory: packages/vscode
        run: pnpm exec vsce publish --packagePath route-scout.vsix

      - name: Publish to Open VSX
        if: ${{ steps.check.outputs.release == 'true' && env.OVSX_TOKEN != '' }}
        run: pnpm dlx ovsx publish packages/vscode/route-scout.vsix -p "$OVSX_TOKEN"

      - name: Tag and create GitHub Release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" packages/vscode/route-scout.vsix \
            --title "v$VERSION" --generate-notes
