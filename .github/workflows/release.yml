name: Release

# Publishes the VSCode extension on a version tag. Bump the extension version,
# then:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Each target runs only when its secret is configured:
#   VSCE_PAT    → VS Marketplace
#   OVSX_TOKEN  → Open VSX
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Gate the release on a green build.
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Package extension
        run: pnpm package:vscode

      - name: Publish to VS Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: packages/vscode
        run: pnpm exec vsce publish --packagePath route-scout.vsix

      - name: Publish to Open VSX
        if: ${{ env.OVSX_TOKEN != '' }}
        run: pnpm dlx ovsx publish packages/vscode/route-scout.vsix -p "$OVSX_TOKEN"
