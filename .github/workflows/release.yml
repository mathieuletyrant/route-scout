name: Release

# Releases happen straight from main: bump the version in
# packages/vscode/package.json and push. When that version has no matching
# `v<version>` git tag yet, the job builds, packages, tags the commit and
# creates a GitHub Release with the .vsix attached (no tokens required).
#
# Store publishing is opt-in via secrets and layered on top:
#   VSCE_PAT   → also publish to the VS Marketplace
#   OVSX_TOKEN → also publish to Open VSX
# Ordinary commits that don't change the version are no-ops.
#
# The CLI (`@route-scout/cli` on npm) ships on its OWN cadence in a separate job
# via OIDC Trusted Publishing (no stored token): bump the version in
# packages/cli/package.json and push. It publishes only when that version isn't
# already on npm. Decoupled from the extension release above — either can ship
# without the other. First publish is manual (the package must exist before a
# trusted publisher can be configured); CI takes over after. See CLAUDE.md.
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: check
        run: |
          VERSION=$(node -p "require('./packages/vscode/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "v$VERSION already tagged — skipping." && echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing v$VERSION." && echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.release == 'true'
      - uses: actions/setup-node@v4
        if: steps.check.outputs.release == 'true'
        with:
          node-version: 22
          cache: pnpm

      - if: steps.check.outputs.release == 'true'
        run: pnpm install --frozen-lockfile

      # Gate the release on a green build.
      - if: steps.check.outputs.release == 'true'
        run: pnpm check
      - if: steps.check.outputs.release == 'true'
        run: pnpm typecheck
      - if: steps.check.outputs.release == 'true'
        run: pnpm test
      - if: steps.check.outputs.release == 'true'
        run: pnpm build

      - name: Package extension
        if: steps.check.outputs.release == 'true'
        run: pnpm package:vscode

      # Tag + GitHub Release first, so the artifact is guaranteed and a flaky
      # store publish can't wedge re-runs. Store steps are best-effort.
      - name: Tag and create GitHub Release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" packages/vscode/route-scout.vsix \
            --title "v$VERSION" --generate-notes

      # Both stores attempt independently (continue-on-error, so one failing
      # doesn't skip the other and never rolls back the GitHub Release above).
      # The final step then surfaces any failure by failing the run.
      - name: Publish to VS Marketplace
        id: vsce
        if: ${{ steps.check.outputs.release == 'true' && env.VSCE_PAT != '' }}
        continue-on-error: true
        working-directory: packages/vscode
        run: pnpm exec vsce publish --packagePath route-scout.vsix

      - name: Publish to Open VSX
        id: ovsx
        if: ${{ steps.check.outputs.release == 'true' && env.OVSX_TOKEN != '' }}
        continue-on-error: true
        run: |
          pnpm dlx ovsx create-namespace MathieuLeTyrant -p "$OVSX_TOKEN" || true
          pnpm dlx ovsx publish packages/vscode/route-scout.vsix -p "$OVSX_TOKEN"

      - name: Fail if a store publish failed
        if: steps.check.outputs.release == 'true'
        run: |
          failed=0
          if [ "${{ steps.vsce.outcome }}" = "failure" ]; then
            echo "::error::VS Marketplace publish failed" && failed=1
          fi
          if [ "${{ steps.ovsx.outcome }}" = "failure" ]; then
            echo "::error::Open VSX publish failed" && failed=1
          fi
          exit $failed

  # Publish the CLI (@route-scout/cli) to npm on its own version cadence via
  # OIDC Trusted Publishing — no stored token. Requires a trusted publisher
  # configured for the package on npmjs.com (org: this repo owner, repo: this
  # repo, workflow: release.yml). Skips when the version is already on the
  # registry, so ordinary pushes are no-ops. The package must exist first: do
  # the initial publish manually (see CLAUDE.md), then CI takes over.
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token npm exchanges for publish auth
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Decide whether to publish the CLI
        id: check
        run: |
          NAME=$(node -p "require('./packages/cli/package.json').name")
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already on npm — skipping." && echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $NAME@$VERSION to npm." && echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.publish == 'true'
      - uses: actions/setup-node@v4
        if: steps.check.outputs.publish == 'true'
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - if: steps.check.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      # Gate the publish on a green build (same bar as the extension release).
      - if: steps.check.outputs.publish == 'true'
        run: pnpm check
      - if: steps.check.outputs.publish == 'true'
        run: pnpm typecheck
      - if: steps.check.outputs.publish == 'true'
        run: pnpm test
      # Builds core so the CLI's esbuild bundle can resolve @route-scout/core.
      - if: steps.check.outputs.publish == 'true'
        run: pnpm build

      # OIDC: pnpm mints an id-token (via id-token: write) and exchanges it with
      # npm for short-lived publish auth — no NODE_AUTH_TOKEN. --no-git-checks
      # skips pnpm's clean-tree/branch guard; `prepublishOnly` re-bundles the CLI.
      - name: Publish CLI to npm (OIDC trusted publishing)
        if: steps.check.outputs.publish == 'true'
        working-directory: packages/cli
        run: pnpm publish --no-git-checks
